<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Our Gallery — Memories</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#F7EEE1">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Memories">
<meta name="format-detection" content="telephone=no">
<meta name="color-scheme" content="light">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Yesteryear&family=Playfair+Display:ital,wght@0,600;1,500&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   MEMORIES — SHARED STYLES
   ============================================================ */
:root {
  --cream: #F7EEE1; --cream-soft: #FBF6EC; --white: #FFFFFF;
  --ink: #2E1B0F; --brown: #4A2F1C; --brown-deep: #2A1810;
  --gold: #C79A3D; --gold-soft: #E6C77A; --muted: #8A7563;
  --border: #E8DCC8; --star: #E3A008;
  --shadow: 0 6px 20px rgba(42, 24, 16, 0.08);
  --radius-lg: 18px; --radius-md: 12px; --radius-sm: 8px; --max-w: 480px;
  --safe-t: env(safe-area-inset-top, 0px);
  --safe-b: env(safe-area-inset-bottom, 0px);
  --safe-l: env(safe-area-inset-left, 0px);
  --safe-r: env(safe-area-inset-right, 0px);
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html { height:-webkit-fill-available; }
html, body { margin:0; padding:0; background:var(--cream); color:var(--ink); font-family:'Poppins',sans-serif; -webkit-font-smoothing:antialiased; overscroll-behavior-y:none; }
body {
  min-height:100vh; min-height:100dvh; height:100%;
  display:flex; justify-content:center;
  background: var(--cream);
}
/* Desktop / tablet: present the app as a centered phone-style card so the
   experience still reads as a mobile menu even on a Windows browser window */
@media (min-width: 720px) {
  body {
    background: linear-gradient(160deg, #EFE2CB 0%, #F7EEE1 55%, #EAD9BC 100%);
    align-items:flex-start;
    padding: 36px 16px;
  }
}
.app {
  width:100%; max-width:var(--max-w); min-height:100vh; min-height:100dvh;
  background:var(--cream); position:relative; padding-bottom:calc(84px + var(--safe-b));
  padding-left:var(--safe-l); padding-right:var(--safe-r);
}
@media (min-width: 720px) {
  .app {
    min-height:auto;
    border-radius:28px;
    box-shadow:0 30px 70px rgba(42,24,16,0.22), 0 0 0 10px rgba(255,255,255,0.5);
    overflow:hidden;
    max-height:calc(100vh - 72px);
    overflow-y:auto;
    scrollbar-width:thin;
  }
  .bottom-nav { border-radius:0 0 28px 28px; }
}
a { text-decoration:none; color:inherit; } button { font-family:inherit; cursor:pointer; touch-action:manipulation; }
/* Give every interactive control a visible, quick press response for touch */
button, .card-media, .chip, .quicknav-item, .nav-item, .pill-btn, .size-opt, .pd-thumb {
  transition: transform .12s ease, opacity .12s ease, background-color .12s ease;
}
button:active, .card-media:active, .chip:active, .quicknav-item:active, .nav-item:active,
.pill-btn:active, .size-opt:active, .pd-thumb:active, .wish-btn:active {
  transform: scale(0.94); opacity:0.85;
}
.card-media:active img { transform: scale(1.03); }
/* Minimum comfortable touch target size on touch devices */
@media (pointer: coarse) {
  .icon-btn, .wish-btn, .modal-close, .qty-control button { min-width:40px; min-height:40px; }
  .search-bar input, .modal-input, .modal-textarea { font-size:16px; }
}
.logo { font-family:'Yesteryear',cursive; font-size:26px; color:var(--ink); display:inline-flex; align-items:center; gap:6px; line-height:1; }
.logo .heart { color:var(--gold); font-size:15px; transform:translateY(-8px); }
.topbar { position:sticky; top:0; z-index:20; background:var(--cream); padding:calc(14px + var(--safe-t)) 18px 10px; border-bottom:1px solid var(--border); }
.topbar-row { display:flex; align-items:center; justify-content:space-between; }
.icon-btn { width:36px; height:36px; display:flex; align-items:center; justify-content:center; color:var(--brown); }
.topbar-actions { display:flex; align-items:center; gap:16px; }
.search-bar { margin-top:12px; display:flex; align-items:center; background:var(--white); border:1px solid var(--border); border-radius:999px; padding:10px 8px 10px 18px; gap:8px; }
.search-bar input { flex:1; border:none; outline:none; background:transparent; font-family:inherit; font-size:14px; color:var(--ink); }
.search-bar input::placeholder { color:var(--muted); }
.search-go { width:34px; height:34px; border-radius:50%; background:var(--brown-deep); color:var(--white); border:none; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.quicknav { display:flex; overflow-x:auto; gap:22px; padding:16px 18px 4px; scrollbar-width:none; }
.quicknav::-webkit-scrollbar { display:none; }
.quicknav-item { display:flex; flex-direction:column; align-items:center; gap:6px; flex-shrink:0; min-width:56px; background:none; border:none; }
.quicknav-icon { width:46px; height:46px; border-radius:var(--radius-md); background:var(--white); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; color:var(--brown); }
.quicknav-icon.active { background:var(--brown-deep); color:var(--white); border-color:var(--brown-deep); }
.quicknav-label { font-size:10.5px; color:var(--brown); text-align:center; line-height:1.2; }
.section-title { font-family:'Playfair Display',serif; font-style:italic; font-size:26px; text-align:center; margin:6px 0 2px; color:var(--ink); }
.section-sub { text-align:center; font-size:12px; color:var(--muted); margin-bottom:14px; }

/* Hero */
.hero {
  position:relative; margin:14px 18px 22px; border-radius:var(--radius-lg);
  background-size:cover; background-position:center; min-height:340px;
  display:flex; align-items:flex-end; overflow:hidden;
}
.hero-content { padding:26px 22px 26px; color:var(--white); }
.hero-eyebrow {
  display:inline-block; font-size:10.5px; font-weight:700; letter-spacing:1.2px; text-transform:uppercase;
  background:rgba(255,255,255,0.18); border:1px solid rgba(255,255,255,0.35); border-radius:999px;
  padding:5px 12px; margin-bottom:12px; backdrop-filter:blur(2px);
}
.hero-title { font-family:'Playfair Display',serif; font-weight:600; font-size:clamp(26px,7vw,34px); line-height:1.15; margin:0 0 10px; }
.hero-title em { font-style:italic; color:var(--gold-soft); }
.hero-sub { font-size:12.5px; line-height:1.5; color:rgba(255,255,255,0.88); max-width:320px; margin:0 0 18px; }
.hero-actions { display:flex; flex-wrap:wrap; gap:10px; }
.btn-lg.outline.light { background:rgba(255,255,255,0.08); color:var(--white); border:1px solid rgba(255,255,255,0.55); backdrop-filter:blur(2px); }

/* Trending / view-all */
.trending-header { padding:0 18px; }
.view-all-row { display:flex; justify-content:center; padding:4px 18px 26px; }

/* Gallery sub-category chip row */
.subchip-row { padding-top:0; margin-top:-6px; }
.chip.subchip { background:var(--cream-soft); font-size:11.5px; padding:7px 14px; }
.chip.subchip.active { background:var(--gold); color:var(--brown-deep); border-color:var(--gold); }
.chip-row { display:flex; overflow-x:auto; gap:8px; padding:0 18px 12px; scrollbar-width:none; }
.chip-row::-webkit-scrollbar { display:none; }
.chip { flex-shrink:0; padding:9px 16px; border-radius:999px; border:1px solid var(--border); background:var(--white); font-size:12.5px; color:var(--brown); display:flex; align-items:center; gap:6px; white-space:nowrap; }
.chip svg { width:14px; height:14px; flex-shrink:0; }
.chip.active { background:var(--brown-deep); color:var(--white); border-color:var(--brown-deep); }
.filter-sort-row { display:flex; justify-content:flex-start; padding:0 18px 14px; gap:8px; }
.pill-btn { flex:none; display:inline-flex; align-items:center; justify-content:center; gap:5px; padding:6px 12px; border-radius:999px; border:1px solid var(--border); background:var(--white); font-size:11px; color:var(--brown); }
.pill-btn svg { width:13px; height:13px; }
.grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; padding:0 18px 20px; }
.card { position:relative; background:var(--white); border-radius:var(--radius-lg); overflow:hidden; box-shadow:var(--shadow); display:flex; flex-direction:column; }
.card-media { position:relative; aspect-ratio:1/1; overflow:hidden; cursor:pointer; }
.card-media img { width:100%; height:100%; object-fit:cover; display:block; }
.wish-btn { position:absolute; top:8px; right:8px; width:30px; height:30px; border-radius:50%; background:rgba(255,255,255,0.92); border:none; display:flex; align-items:center; justify-content:center; color:var(--brown); }
.wish-btn.active { color:#C0392B; }
.badge-tag { position:absolute; top:8px; left:8px; background:var(--gold-soft); color:var(--brown-deep); font-size:9.5px; font-weight:600; padding:3px 8px; border-radius:999px; letter-spacing:0.3px; }
.card-body { padding:10px 12px 12px; display:flex; flex-direction:column; gap:4px; flex:1; }
.card-name { font-size:13.5px; font-weight:600; color:var(--ink); line-height:1.25; cursor:pointer; }
.card-desc { font-size:10.5px; color:var(--muted); line-height:1.3; min-height:26px; }
.card-price-row { display:flex; align-items:baseline; gap:6px; margin-top:2px; }
.price { font-size:14.5px; font-weight:700; color:var(--ink); }
.mrp { font-size:11px; color:var(--muted); text-decoration:line-through; }
.rating-row { display:flex; align-items:center; gap:4px; font-size:10.5px; color:var(--muted); }
.stars { color:var(--star); font-size:11px; letter-spacing:1px; }
.card-actions { display:flex; gap:6px; margin-top:8px; }
.card-actions .btn { height:32px; padding:0 4px; font-size:10.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.btn { flex:1; border:none; border-radius:999px; padding:9px 6px; font-size:11px; font-weight:600; text-align:center; display:flex; align-items:center; justify-content:center; gap:5px; }
.btn-dark { background:var(--brown-deep); color:var(--white); }
.btn-outline { background:var(--white); color:var(--brown); border:1px solid var(--border); }
.bottom-nav { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:var(--max-w); background:var(--cream-soft); border-top:1px solid var(--border); display:flex; justify-content:space-around; padding:8px 4px calc(10px + var(--safe-b)); z-index:30; padding-left:calc(4px + var(--safe-l)); padding-right:calc(4px + var(--safe-r)); }
@media (min-width:720px) { .bottom-nav { position:sticky; left:auto; transform:none; } }
@media (min-width: 900px) {
  :root { --max-w: 720px; }
  .grid { grid-template-columns:repeat(3, 1fr); }
  .related-card { width:160px; }
}
@media (min-width: 1180px) {
  :root { --max-w: 940px; }
  .grid { grid-template-columns:repeat(4, 1fr); }
}
.nav-item { display:flex; flex-direction:column; align-items:center; gap:3px; color:var(--muted); font-size:9.5px; background:none; border:none; }
.nav-item.active { color:var(--brown-deep); }
.nav-item svg { width:20px; height:20px; }
.pd-media { position:relative; aspect-ratio:1/1; overflow:hidden; touch-action:pan-y; }
.pd-media img { width:100%; height:100%; object-fit:cover; display:block; }
@media (min-width: 720px) {
  .pd-wrap { display:grid; grid-template-columns:1fr 1fr; gap:24px; align-items:start; padding:0 18px; }
  .pd-wrap .pd-media { border-radius:var(--radius-lg); max-height:520px; }
  .pd-wrap .pd-body { padding:4px 0 0; }
  .pd-wrap .pd-thumbs { padding:10px 0; }
}
.pd-thumbs { display:flex; gap:8px; padding:10px 18px; overflow-x:auto; }
.pd-thumb { width:58px; height:58px; border-radius:10px; overflow:hidden; border:2px solid transparent; flex-shrink:0; padding:0; }
.pd-thumb.active { border-color:var(--brown-deep); }
.pd-thumb img { width:100%; height:100%; object-fit:cover; display:block; }
.pd-body { padding:4px 18px 0; }
.pd-name { font-size:20px; font-weight:700; color:var(--ink); margin:6px 0 4px; }
.pd-shortdesc { font-size:12.5px; color:var(--muted); line-height:1.4; margin-bottom:8px; }
.pd-rating { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--muted); margin-bottom:10px; }
.pd-price-row { display:flex; align-items:baseline; gap:10px; margin-bottom:14px; }
.pd-price { font-size:22px; font-weight:700; color:var(--ink); }
.pd-mrp { font-size:14px; color:var(--muted); text-decoration:line-through; }
.pd-features { display:flex; flex-direction:column; gap:9px; margin-bottom:16px; }
.pd-feature { display:flex; align-items:center; gap:10px; font-size:12.5px; color:var(--brown); }
.pd-feature svg { flex-shrink:0; color:var(--gold); }
.pd-label { font-size:12.5px; font-weight:600; color:var(--ink); margin-bottom:8px; }
.size-row { display:flex; gap:8px; margin-bottom:18px; flex-wrap:wrap; }
.size-opt { padding:10px 16px; border-radius:var(--radius-sm); border:1px solid var(--border); background:var(--white); font-size:12.5px; color:var(--brown); }
.size-opt.active { background:var(--brown-deep); color:var(--white); border-color:var(--brown-deep); }
.qty-row { display:flex; align-items:center; gap:16px; margin-bottom:20px; }
.qty-control { display:flex; align-items:center; border:1px solid var(--border); border-radius:999px; overflow:hidden; }
.qty-control button { width:36px; height:36px; background:var(--white); border:none; font-size:16px; color:var(--brown); }
.qty-control span { width:34px; text-align:center; font-size:13px; font-weight:600; }
.pd-actions { display:flex; justify-content:center; gap:10px; margin-bottom:18px; flex-wrap:wrap; }
.btn-lg { width:auto; padding:10px 22px; border-radius:999px; border:none; font-size:12.5px; font-weight:500; display:flex; align-items:center; justify-content:center; gap:6px; }
.btn-lg svg { width:15px; height:15px; }
.btn-lg.dark { background:var(--brown-deep); color:var(--white); }
.btn-lg.outline { background:var(--white); color:var(--brown); border:1px solid var(--brown); }
.wa-link { text-align:center; font-size:12.5px; color:#25D366; font-weight:600; display:flex; align-items:center; justify-content:center; gap:6px; }
.desc-box { background:var(--white); border:1px solid var(--border); border-radius:var(--radius-lg); padding:16px; margin:0 18px 20px; }
.desc-title { font-size:13px; font-weight:700; margin-bottom:8px; color:var(--ink); }
.desc-text { font-size:12px; color:var(--brown); line-height:1.6; margin-bottom:10px; }
.desc-list { list-style:none; padding:0; margin:0; display:flex; flex-direction:column; gap:6px; }
.desc-list li { font-size:11.5px; color:var(--brown); padding-left:14px; position:relative; }
.desc-list li::before { content:"•"; color:var(--gold); position:absolute; left:0; }
.delivery-row { display:flex; gap:10px; margin:0 18px 20px; }
.delivery-card { flex:1; background:var(--cream-soft); border:1px solid var(--border); border-radius:var(--radius-md); padding:12px; text-align:center; }
.delivery-card svg { color:var(--brown-deep); margin-bottom:4px; }
.delivery-card .t { font-size:11px; font-weight:600; color:var(--ink); }
.delivery-card .d { font-size:10px; color:var(--muted); }
.related-title { padding:0 18px; font-size:15px; font-weight:700; color:var(--ink); margin-bottom:10px; }
.related-scroll { display:flex; gap:12px; overflow-x:auto; padding:0 18px 22px; scrollbar-width:none; }
.related-scroll::-webkit-scrollbar { display:none; }
.related-card { width:140px; flex-shrink:0; }
.back-row { display:flex; align-items:center; justify-content:space-between; padding:14px 18px; }
.back-btn { display:flex; align-items:center; gap:6px; color:var(--brown); font-size:13px; font-weight:600; background:none; border:none; }
.toast { position:fixed; bottom:90px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--brown-deep); color:var(--white); padding:12px 20px; border-radius:999px; font-size:12.5px; font-weight:600; opacity:0; transition:opacity .25s ease, transform .25s ease; pointer-events:none; z-index:50; white-space:nowrap; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
.empty-state { text-align:center; padding:60px 24px; color:var(--muted); font-size:13px; }

/* Swipe-gallery dots */
.pd-dots { position:absolute; bottom:10px; left:0; right:0; display:flex; justify-content:center; gap:5px; pointer-events:none; }
.pd-dot { width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,0.6); transition:all .2s ease; }
.pd-dot.active { background:var(--white); width:16px; border-radius:4px; }

/* Image skeleton shimmer while loading */
img { background-color:var(--border); }
img[data-loaded="0"] { animation: shimmer 1.2s ease-in-out infinite; }
@keyframes shimmer { 0%,100% { opacity:0.55; } 50% { opacity:0.9; } }

/* Offline banner */
.offline-banner {
  position:fixed; top:0; left:50%; transform:translateX(-50%) translateY(-100%);
  width:100%; max-width:var(--max-w); background:#5C3A1E; color:var(--white);
  font-size:11.5px; font-weight:600; text-align:center; padding:calc(8px + var(--safe-t)) 12px 8px;
  z-index:80; transition:transform .3s ease;
}
.offline-banner.show { transform:translateX(-50%) translateY(0); }
@media (min-width:720px) { .offline-banner { position:absolute; } }

/* Scroll-to-top FAB */
.scroll-top-fab {
  position:fixed; bottom:calc(78px + var(--safe-b)); right:calc(16px + var(--safe-r));
  width:42px; height:42px; border-radius:50%; background:var(--brown-deep); color:var(--white);
  border:none; display:flex; align-items:center; justify-content:center; box-shadow:var(--shadow);
  z-index:25; opacity:0; pointer-events:none; transform:translateY(8px) scale(0.9);
  transition:all .2s ease;
}
.scroll-top-fab.show { opacity:1; pointer-events:auto; transform:translateY(0) scale(1); }
@media (min-width:720px) { .scroll-top-fab { position:absolute; } }

/* Customize modal */
.modal-backdrop { position:fixed; inset:0; background:rgba(42,24,16,0.45); z-index:60; }
.modal-sheet {
  position:fixed; bottom:0; left:50%; transform:translateX(-50%);
  width:100%; max-width:var(--max-w); max-height:88vh; overflow-y:auto;
  background:var(--cream-soft); border-radius:22px 22px 0 0; z-index:61;
  padding:18px 20px calc(26px + var(--safe-b)); box-shadow:0 -8px 30px rgba(0,0,0,0.18);
}
.modal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
.modal-title { font-size:15.5px; font-weight:700; color:var(--ink); }
.modal-close { width:30px; height:30px; border-radius:50%; background:var(--white); border:1px solid var(--border); font-size:16px; color:var(--brown); display:flex; align-items:center; justify-content:center; }
.modal-product { font-size:12.5px; color:var(--muted); margin-bottom:14px; }
.modal-product b { color:var(--ink); }
.modal-label { font-size:12px; font-weight:600; color:var(--ink); margin-bottom:6px; }
.modal-textarea {
  width:100%; min-height:80px; border-radius:var(--radius-md); border:1px solid var(--border);
  background:var(--white); padding:12px; font-family:inherit; font-size:12.5px; color:var(--ink);
  resize:vertical; margin-bottom:16px;
}
.modal-textarea::placeholder { color:var(--muted); }
.upload-box {
  border:1.5px dashed var(--border); border-radius:var(--radius-md); background:var(--white);
  padding:18px; text-align:center; margin-bottom:18px; cursor:pointer; position:relative; overflow:hidden;
}
.upload-box .placeholder { font-size:12px; color:var(--muted); }
.upload-box .placeholder svg { display:block; margin:0 auto 8px; color:var(--brown); }
.upload-preview { width:100%; max-height:160px; object-fit:cover; border-radius:var(--radius-sm); display:block; }
.upload-remove {
  position:absolute; top:8px; right:8px; width:26px; height:26px; border-radius:50%;
  background:rgba(255,255,255,0.9); border:none; color:var(--brown); font-size:14px;
  display:flex; align-items:center; justify-content:center;
}
.modal-note { font-size:10.5px; color:var(--muted); text-align:center; margin-bottom:14px; line-height:1.5; }
.modal-input {
  width:100%; border-radius:var(--radius-md); border:1px solid var(--border);
  background:var(--white); padding:12px; font-family:inherit; font-size:12.5px; color:var(--ink);
  margin-bottom:10px;
}
.modal-input::placeholder { color:var(--muted); }
</style>
</head>
<body>
<div class="app">
  <div id="root"></div>
  <nav class="bottom-nav" id="bottomNav"></nav>
</div>
<div id="modalRoot"></div>

<script>
/* ============================================================
   DATA — edit shop info & products here
   ============================================================ */
const SHOP = {
  name: "Memories",
  whatsappNumber: "919763622170" // <-- replace with the real WhatsApp number
};

// Top-level gallery filter groups. "photo" bundles several raw product
// categories together and exposes them as sub-filters (a "sub section").
const CATEGORY_GROUPS = [
  { id: "photo",     name: "Photo",      icon: "frame",
    children: [
      { id: "frames",   name: "Photo Frames",   icon: "frame" },
      { id: "mugs",     name: "Photo Mugs",     icon: "mug" },
      { id: "cushions", name: "Photo Cushions", icon: "cushion" }
    ]
  },

function getProducts(category, subcategory) {
  if (!category || category === "all") return PRODUCTS;
  if (subcategory) return PRODUCTS.filter(p => p.category === subcategory);
  const group = groupInfo(category);
  if (group && group.children) {
    const ids = group.children.map(c => c.id);
    return PRODUCTS.filter(p => ids.includes(p.category));
  }
  return PRODUCTS.filter(p => p.category === category);
}
function getProduct(id) { return PRODUCTS.find(p=>p.id===id); }

// "Trending" ranking blends order volume (reviews as a proxy), star rating,
// merchandising flags, and whether the shopper has favorited the item.
function getTrendingProducts(limit) {
  const wl = getWishlist();
  return [...PRODUCTS].sort((a, b) => {
    const score = p => (p.reviews||0) + (p.rating||0)*20 + (p.bestseller?60:0) + (p.trending?35:0) + (wl.includes(p.id)?120:0);
    return score(b) - score(a);
  }).slice(0, limit || 8);
}

  vibrate(15);

  if (list.includes(id)) list = list.filter(x=>x!==id); else list.push(id);
  sessionStorage.setItem("wishlist", JSON.stringify(list));
  render();
}
function showToast(msg) {
  let t = document.getElementById("toast");
  if (!t) { t=document.createElement("div"); t.id="toast"; t.className="toast"; document.body.appendChild(t); }
  t.textContent = msg; t.classList.add("show");
  clearTimeout(window._tt); window._tt = setTimeout(()=>t.classList.remove("show"), 1800);
}

let state = {
  view: "home",          // "home" | "gallery" | "detail" | "wishlist"
  category: "all",       // gallery top-level group filter
  subcategory: null,     // gallery sub-filter (used within the "photo" group)
  search: "",
  sort: "newest",
  productId: null,
  activeImage: 0,
  activeSize: null,
  qty: 1,
  customizeOpen: false,
  customizeProductId: null,
  customizeImageData: null, // data URL for preview only
  customizeSize: null
};

function vibrate(ms) { try { if (navigator.vibrate) navigator.vibrate(ms||10); } catch(e) {} }

// Push a history entry for every in-app navigation so the phone's hardware
// back button (Android) / browser back gesture steps back through the app
// instead of immediately closing the tab.
function pushHistory(label) {
  try { history.pushState({ appNav:true, ts:Date.now(), label }, "", ""); } catch(e) {}
}
window.addEventListener("popstate", (e) => {
  if (state.customizeOpen) { state.customizeOpen = false; render(); return; }
  if (state.view === "detail" || state.view === "wishlist") {
    state.view = "gallery";
    render(); window.scrollTo(0,0);
  } else if (state.view === "gallery") {
    state.view = "home";
    render(); window.scrollTo(0,0);
  }
});

function goToHome() { vibrate(); pushHistory("home"); state = {...state, view:"home"}; render(); scrollAppTop(); }
function goToGallery(category, subcategory) {
  vibrate(); pushHistory("gallery");
  state = {...state, view:"gallery", category: category||"all", subcategory: subcategory||null};
  render(); scrollAppTop();
  const input = document.getElementById("searchInput");
  if (input && state.focusSearchOnLoad) { input.focus(); state.focusSearchOnLoad = false; }
}
// Used from a product's Back button / related items to land in the right gallery group.
function goToProductCategory(rawCategory) {
  const group = groupOf(rawCategory);
  const sub = group === "photo" ? rawCategory : null;
  goToGallery(group, sub);
}
function goToWishlist() { vibrate(); pushHistory("wishlist"); state = {...state, view:"wishlist"}; render(); scrollAppTop(); }
function goToProduct(id) {
  vibrate();
  pushHistory("detail:"+id);
  const p = getProduct(id);
  state = {...state, view:"detail", productId:id, activeImage:0, activeSize: p ? p.sizes[0] : null, qty:1};
  render(); scrollAppTop();
}
function scrollAppTop() {
  const scroller = document.querySelector(".app");
  if (scroller && getComputedStyle(scroller).overflowY === "auto") scroller.scrollTo(0,0);
  window.scrollTo(0,0);
}

function productCard(p) {
  const wl = getWishlist();
  const wished = wl.includes(p.id);
  const tag = p.bestseller ? "Bestseller" : (p.trending ? "Trending" : "");
  return `
  <div class="card">
    <div class="card-media" onclick="goToProduct('${p.id}')">
      <img src="${p.images[0]}" alt="${p.name}" loading="lazy">
      ${tag ? `<span class="badge-tag">${tag}</span>` : ""}
    </div>
    <button class="wish-btn ${wished?"active":""}" onclick="toggleWish('${p.id}')">${icon(wished?"heartFilled":"heart")}</button>
    <div class="card-body">
      <div class="card-name" onclick="goToProduct('${p.id}')">${p.name}</div>
      <div class="card-desc">${p.shortDesc}</div>
      <div class="card-price-row"><span class="price">₹${p.price}</span>${p.mrp?`<span class="mrp">₹${p.mrp}</span>`:""}</div>
      <div class="rating-row"><span class="stars">${starString(p.rating)}</span> (${p.reviews})</div>

      </div>
    </div>
  </div>`;
}

function renderGallery() {
  let list = getProducts(state.category, state.subcategory);
  if (state.search.trim()) {
    const q = state.search.toLowerCase();
    list = list.filter(p => p.name.toLowerCase().includes(q) || p.shortDesc.toLowerCase().includes(q));
  }
  if (state.sort==="priceLow") list = [...list].sort((a,b)=>a.price-b.price);
  else if (state.sort==="priceHigh") list = [...list].sort((a,b)=>b.price-a.price);
  else if (state.sort==="rating") list = [...list].sort((a,b)=>b.rating-a.rating);

  const sortLabel = {newest:"Newest", priceLow:"Price ↑", priceHigh:"Price ↓", rating:"Top Rated"}[state.sort];
  const allChips = [{id:"all",name:"All"}, ...CATEGORY_GROUPS];
  const activeGroup = groupInfo(state.category);
  const showSubchips = activeGroup && activeGroup.children;

  return `
    <header class="topbar">
      <div class="topbar-row">
        <button class="icon-btn" onclick="goToHome()">${icon("back")}</button>
        <span class="logo" style="font-size:20px;">Memories<span class="heart">♡</span></span>

    <p class="section-sub">Beautiful memories, beautifully framed.</p>

    <div class="chip-row">
      ${allChips.map(c => `<button class="chip ${state.category===c.id?"active":""}" onclick="goToGallery('${c.id}')">${c.icon?icon(c.icon):""} ${c.name}</button>`).join("")}
    </div>

    ${showSubchips ? `
    <div class="chip-row subchip-row">
      <button class="chip subchip ${!state.subcategory?"active":""}" onclick="goToGallery('${activeGroup.id}')">All Photo</button>
      ${activeGroup.children.map(c => `<button class="chip subchip ${state.subcategory===c.id?"active":""}" onclick="goToGallery('${activeGroup.id}','${c.id}')">${c.name}</button>`).join("")}
    </div>
    ` : ""}

    <div class="filter-sort-row">
      <button class="pill-btn">${icon("filter")} Filter</button>
      <button class="pill-btn" id="sortBtn">${icon("sort")} Sort: ${sortLabel}</button>
    </div>

    ${list.length ? `<div class="grid">${list.map(productCard).join("")}</div>`
                  : `<div class="empty-state">No products found. Try a different search or category.</div>`}
  `;
}

    </div>

    <div class="pd-body">
      <div class="pd-name">${p.name}</div>
      <div class="pd-shortdesc">${p.shortDesc}</div>
      <div class="pd-rating"><span class="stars">${starString(p.rating)}</span> (${p.reviews} reviews)</div>
      <div class="pd-price-row"><span class="pd-price">₹${p.price}</span>${p.mrp?`<span class="pd-mrp">₹${p.mrp}</span>`:""}</div>

      <div class="pd-features">${p.features.slice(0,4).map(f => `<div class="pd-feature">${icon("check")}<span>${f}</span></div>`).join("")}</div>

      <div class="pd-label">Select Size</div>
      <div class="size-row">${p.sizes.map(s => `<button class="size-opt ${s===state.activeSize?"active":""}" onclick="setSize('${s}')">${s}</button>`).join("")}</div>

      <div class="pd-label">Quantity</div>
      <div class="qty-row"><div class="qty-control">
        <button onclick="setQty(-1)">−</button><span>${state.qty}</span><button onclick="setQty(1)">+</button>
      </div></div>

      <div class="pd-actions">
        <button class="btn-lg outline" onclick="openCustomize('${p.id}')">Customize</button>
        <button class="btn-lg dark" onclick="window.open('${waLink(waOrderMsg(p, state.activeSize, state.qty))}','_blank')">${icon("whatsapp")} Order on WhatsApp</button>
      </div>
    </div>
    </div>

    <div class="desc-box" style="margin-top:22px;">
      <div class="desc-title">Product Description</div>
      <div class="desc-text">${p.description}</div>
      <ul class="desc-list">${p.features.map(f => `<li>${f}</li>`).join("")}</ul>
    </div>

    
    ${related.length ? `
    <div class="related-title">You May Also Like</div>
    <div class="related-scroll">${related.map(x => `<div class="related-card">${productCard(x)}</div>`).join("")}</div>
    ` : ""}
  `;
}

function setImage(i) { state.activeImage = i; render(); }
function setSize(s) { state.activeSize = s; render(); }
function setQty(d) { vibrate(8); state.qty = Math.max(1, Math.min(20, state.qty + d)); render(); }

function renderWishlist() {
  const wl = getWishlist();
  const products = PRODUCTS.filter(p => wl.includes(p.id));
  return `
    <div class="back-row">
      <button class="back-btn" onclick="goToGallery('all')">${icon("back")} Back</button>
      <span class="logo" style="font-size:18px;">Memories<span class="heart">♡</span></span>
      <span style="width:36px;"></span>
    </div>
    <div class="section-title">My Wishlist</div>
    <p class="section-sub">${products.length ? `${products.length} item${products.length>1?"s":""} saved` : "Nothing saved yet"}</p>
    ${products.length
      ? `<div class="grid">${products.map(productCard).join("")}</div>`
      : `<div class="empty-state">Tap the heart icon on any product to save it here.</div>`}
  `;
}

function render() {
  const root = document.getElementById("root");
  if (state.view === "detail") root.innerHTML = renderDetail();
  else if (state.view === "wishlist") root.innerHTML = renderWishlist();
  else if (state.view === "gallery") root.innerHTML = renderGallery();
  else root.innerHTML = renderHome();

  if (state.view === "gallery") {
    const input = document.getElementById("searchInput");
    if (input) {
      input.addEventListener("input", (e) => { state.search = e.target.value; render(); input.focus(); input.setSelectionRange(input.value.length, input.value.length); });
      if (state.focusSearchOnLoad) { input.focus(); state.focusSearchOnLoad = false; }
    }
    const sortBtn = document.getElementById("sortBtn");
    if (sortBtn) {
      sortBtn.addEventListener("click", () => {
        const modes = ["newest","priceLow","priceHigh","rating"];
        state.sort = modes[(modes.indexOf(state.sort)+1) % modes.length];
        render();
      });
    }
  }
  if (state.view === "detail") setupGallerySwipe();
  setupImageLoadState();
  renderBottomNav();
  renderCustomizeModal();
}

// Mark each image with a data-loaded flag so the CSS skeleton shimmer shows
// until the real photo has actually painted (nicer on slow mobile data).
function setupImageLoadState() {
  document.querySelectorAll('img:not([data-loaded])').forEach(img => {
    img.setAttribute("data-loaded", img.complete ? "1" : "0");
    if (!img.complete) {
      img.addEventListener("load", () => img.setAttribute("data-loaded","1"), { once:true });
      img.addEventListener("error", () => img.setAttribute("data-loaded","1"), { once:true });
    }
  });
}

// Swipe left/right on the product gallery image to move between photos —
// the natural gesture on a phone instead of only tapping tiny thumbnails.
function setupGallerySwipe() {
  const media = document.getElementById("pdMedia");
  if (!media) return;
  let startX = 0, startY = 0, tracking = false;
  media.addEventListener("touchstart", (e) => {
    const t = e.touches[0]; startX = t.clientX; startY = t.clientY; tracking = true;
  }, { passive:true });
  media.addEventListener("touchend", (e) => {
    if (!tracking) return; tracking = false;
    const t = e.changedTouches[0];
    const dx = t.clientX - startX, dy = t.clientY - startY;
    if (Math.abs(dx) > 40 && Math.abs(dx) > Math.abs(dy)) {
      const p = getProduct(state.productId);
      if (!p) return;
      const n = p.images.length;
      let next = state.activeImage + (dx < 0 ? 1 : -1);
      next = (next + n) % n;
      setImage(next);
    }
  }, { passive:true });
}

/* ---------- Offline detection banner ---------- */
function ensureOfflineBanner() {
  let b = document.getElementById("offlineBanner");
  if (!b) {
    b = document.createElement("div");
    b.id = "offlineBanner";
    b.className = "offline-banner";
    b.textContent = "You're offline — some content may not load";
    (document.querySelector(".app") || document.body).appendChild(b);
  }
  return b;
}
function updateOfflineBanner() {
  const b = ensureOfflineBanner();
  b.classList.toggle("show", !navigator.onLine);
}
window.addEventListener("online", updateOfflineBanner);
window.addEventListener("offline", updateOfflineBanner);

/* ---------- Scroll-to-top FAB ---------- */
function ensureScrollTopFab() {
  let f = document.getElementById("scrollTopFab");
  if (!f) {
    f = document.createElement("button");
    f.id = "scrollTopFab";
    f.className = "scroll-top-fab";
    f.setAttribute("aria-label", "Scroll to top");
    f.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 19V5M5 12l7-7 7 7"/></svg>`;
    f.addEventListener("click", () => { vibrate(); scrollAppTop(); });
    (document.querySelector(".app") || document.body).appendChild(f);
  }
  return f;
}
function handleScrollForFab() {
  const fab = ensureScrollTopFab();
  const y = (document.querySelector(".app") && getComputedStyle(document.querySelector(".app")).overflowY === "auto")
    ? document.querySelector(".app").scrollTop
    : window.scrollY;
  fab.classList.toggle("show", y > 600);
}
window.addEventListener("scroll", handleScrollForFab, { passive:true });
function initGlobalListeners() {
  const appEl = document.querySelector(".app");
  if (appEl) appEl.addEventListener("scroll", handleScrollForFab, { passive:true });
  updateOfflineBanner();
}
if (document.readyState === "loading") {
  document.addEventListener("DOMContentLoaded", initGlobalListeners);
} else {
  initGlobalListeners();
}

function renderBottomNav() {
  const wl = getWishlist();
  document.getElementById("bottomNav").innerHTML = `
    <button class="nav-item ${state.view==="home" ? "active":""}" onclick="goToHome()">${icon("home")}<span>Home</span></button>
    <button class="nav-item ${(state.view==="gallery"||state.view==="detail") ? "active":""}" onclick="goToGallery('all')">${icon("grid")}<span>Gallery</span></button>
    <button class="nav-item ${state.view==="wishlist" ? "active":""}" onclick="goToWishlist()">${icon(wl.length?"heartFilled":"heart")}<span>Wishlist (${wl.length})</span></button>
    <a class="nav-item" href="${waLink(`Hi ${SHOP.name}! I'd like to know more about your products.`)}" target="_blank">${icon("whatsapp")}<span>Order</span></a>
  `;
}

/* ---------- Customize form modal ---------- */
function openCustomize(id) {
  vibrate();
  pushHistory("customize:"+id);
  const p = getProduct(id);
  state.customizeOpen = true;
  state.customizeProductId = id;
  state.customizeImageData = null;
  state.customizeSize = (p && p.sizes && p.sizes.length) ? p.sizes[0] : null;
  render();
}
function closeCustomize() {
  state.customizeOpen = false;
  render();
}
function selectCustomizeSize(s, btnEl) {
  state.customizeSize = s;
  const row = btnEl.parentElement;
  row.querySelectorAll(".size-opt").forEach(b => b.classList.remove("active"));
  btnEl.classList.add("active");
}
function handleCustomizeImage(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    state.customizeImageData = e.target.result;
    updateCustomizeImageBox();
  };
  reader.readAsDataURL(file);
}
function removeCustomizeImage(event) {
  event.stopPropagation();
  state.customizeImageData = null;
  const fileInput = document.getElementById("customizeFileInput");
  if (fileInput) fileInput.value = "";
  updateCustomizeImageBox();
}
function updateCustomizeImageBox() {
  const box = document.getElementById("uploadBoxInner");
  if (!box) return;
  box.innerHTML = state.customizeImageData
    ? `<img class="upload-preview" src="${state.customizeImageData}" alt="Reference preview">
       <button class="upload-remove" onclick="removeCustomizeImage(event)">×</button>`
    : `<div class="placeholder">${icon("frame")}<div>Tap to upload the photo you want used</div></div>`;
}
function dataURLtoFile(dataUrl, filename) {
  const parts = dataUrl.split(",");
  const mimeMatch = parts[0].match(/:(.*?);/);
  const mime = mimeMatch ? mimeMatch[1] : "image/jpeg";
  const bstr = atob(parts[1]);
  let n = bstr.length;
  const u8arr = new Uint8Array(n);
  while (n--) u8arr[n] = bstr.charCodeAt(n);
  return new File([u8arr], filename, { type: mime });
}

async function submitCustomize() {
  const p = getProduct(state.customizeProductId);
  if (!p) return;
  const name = (document.getElementById("customizeName")?.value || "").trim();
  const phone = (document.getElementById("customizePhone")?.value || "").trim();
  const details = (document.getElementById("customizeText")?.value || "").trim();

  if (!name) {
    document.getElementById("customizeName").focus();
    showToast("Please enter your name");
    return;
  }

  let message = `Hi ${SHOP.name}! I'd like to customize:\n\n*${p.name}*\nPrice: ₹${p.price}\n`;
  if (state.customizeSize) message += `Size: ${state.customizeSize}\n`;
  message += `\nCustomization details:\n${details || "-"}\n`;
  message += `\nMy details:\nName: ${name}\nPhone: ${phone || "-"}\n`;

  // If a reference photo was uploaded, try to share it directly (this can
  // actually attach the image when the person picks WhatsApp from their
  // phone's native share sheet). Falls back to a text-only WhatsApp link
  // on browsers/desktops that don't support sharing files.
  if (state.customizeImageData) {
    try {
      const file = dataURLtoFile(state.customizeImageData, "reference-photo.jpg");
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({
          files: [file],
          text: message,
          title: `${SHOP.name} — Customize Order`
        });
        closeCustomize();
        return;
      }
    } catch (err) {
      // Share was cancelled or unsupported — fall through to WhatsApp link below.
    }
    message += `\n(Reference photo: sharing directly wasn't supported on this device — I'll send the photo in this chat right after this message)`;
  }

  window.open(waLink(message), "_blank");
  closeCustomize();
}

function renderCustomizeModal() {
  const modalRoot = document.getElementById("modalRoot");
  if (!state.customizeOpen) { modalRoot.innerHTML = ""; return; }
  const p = getProduct(state.customizeProductId);
  if (!p) { modalRoot.innerHTML = ""; return; }
  const hasSizes = p.sizes && p.sizes.length > 0;
  modalRoot.innerHTML = `
    <div class="modal-backdrop" onclick="closeCustomize()"></div>
    <div class="modal-sheet">
      <div class="modal-header">
        <span class="modal-title">Customize Your Order</span>
        <button class="modal-close" onclick="closeCustomize()">×</button>
      </div>
      <div class="modal-product">For: <b>${p.name}</b> · ₹${p.price}</div>

      ${hasSizes ? `
      <div class="modal-label">Select Size</div>
      <div class="size-row">
        ${p.sizes.map(s => `<button class="size-opt ${s===state.customizeSize?"active":""}" onclick="selectCustomizeSize('${s}', this)">${s}</button>`).join("")}
      </div>
      ` : ""}

      <div class="modal-label">Customization Details</div>
      <textarea id="customizeText" class="modal-textarea" placeholder="e.g. Names to engrave, text, colors, occasion..."></textarea>

      <div class="modal-label">Reference Image (optional)</div>
      <div class="upload-box" onclick="document.getElementById('customizeFileInput').click()">
        <input type="file" id="customizeFileInput" accept="image/*" style="display:none" onchange="handleCustomizeImage(event)">
        <div id="uploadBoxInner">
          ${state.customizeImageData
            ? `<img class="upload-preview" src="${state.customizeImageData}" alt="Reference preview">
               <button class="upload-remove" onclick="removeCustomizeImage(event)">×</button>`
            : `<div class="placeholder">${icon("frame")}<div>Tap to upload the photo you want used</div></div>`}
        </div>
      </div>
      <div class="modal-note">WhatsApp doesn't let a website attach photos automatically — after you tap send, just share this photo in the chat that opens.</div>

      <div class="modal-label">Your Details</div>
      <input type="text" id="customizeName" class="modal-input" placeholder="Your name">
      <input type="tel" id="customizePhone" class="modal-input" placeholder="Phone number (optional)">

      <button class="btn-lg dark" style="width:100%; margin-top:6px;" onclick="submitCustomize()">${icon("whatsapp")} Send Details via WhatsApp</button>
    </div>
  `;
}

render();
</script>
</body>
</html>
